# ─── Identificación del proyecto ────────────────────────────────────────────
sonar.projectKey=techcup_futbol
sonar.projectName=TechCup Fútbol
sonar.projectVersion=0.0.1-SNAPSHOT

# ─── Rutas de código fuente y tests ─────────────────────────────────────────
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# ─── Reporte de cobertura (JaCoCo XML) ──────────────────────────────────────
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ─── Exclusiones (no se analiza cobertura en estas clases) ──────────────────
sonar.exclusions=\
  **/TechcupFutbolApplication.java,\
  **/config/**,\
  **/dto/**,\
  **/model/Notification/**,\
  **/model/User/UserType.java,\
  **/model/User/AcademicProgram.java,\
  **/model/User/ContractType.java,\
  **/model/Match/MatchState.java,\
  **/model/Tournament/TournamentState.java,\
  **/model/Tournament/Field.java,\
  **/model/Payment/Payment.java,\
  **/model/Payment/PaymentStatus.java,\
  **/model/PlayerDecorator/SportsProfile.java

sonar.coverage.exclusions=\
  **/TechcupFutbolApplication.java,\
  **/config/**,\
  **/dto/**,\
  **/model/Notification/**,\
  **/model/User/UserType.java,\
  **/model/User/AcademicProgram.java,\
  **/model/User/ContractType.java,\
  **/model/Match/MatchState.java,\
  **/model/Tournament/TournamentState.java,\
  **/model/Tournament/Field.java,\
  **/model/Payment/Payment.java,\
  **/model/Payment/PaymentStatus.java,\
  **/model/PlayerDecorator/SportsProfile.java

# ─── Encoding ────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ─── Lenguaje ────────────────────────────────────────────────────────────────
sonar.language=java
