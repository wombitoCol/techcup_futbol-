name: 🚀 TechCup Fútbol CI/CD Pipeline

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

env:
  JAVA_VERSION: '21'
  DOCKER_IMAGE: techcup-futbol

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Build & Compile
  # ─────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Compilar proyecto
        run: mvn compile -q

      - name: 📦 Empaquetar (sin tests)
        run: mvn package -DskipTests -q

      - name: 💾 Guardar artefacto JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: Tests con PostgreSQL real
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: techcupdb_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Ejecutar tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/techcupdb_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-key-for-ci-pipeline-256bits-only' }}
        run: mvn test

      - name: 📊 Publicar reporte de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3: Análisis de Calidad de Código
  # ─────────────────────────────────────────────
  code-quality:
    name: 🔍 Calidad de Código
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🔍 Analizar dependencias
        run: mvn dependency:analyze -q || true

  # ─────────────────────────────────────────────
  # JOB 4: Docker Build (push en develop y main)
  # ─────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [ test, code-quality ]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 💾 Descargar JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login en Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️ Determinar tag de imagen
        id: tag
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=develop-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: 🐳 Build y push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 5: Deploy Staging (rama develop)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: 🌐 Deploy Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: 🚀 Deploy a Staging
        run: |
          echo "✅ Deploy a STAGING iniciado"
          echo "📦 Imagen: techcup-futbol:develop-${{ github.sha }}"
          # Reemplazar con comando real, por ejemplo:
          # ssh ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_HOST }} \
          #   "cd /app && docker compose pull && docker compose up -d"
          echo "✅ Deploy a Staging completado"

  # ─────────────────────────────────────────────
  # JOB 6: Deploy Producción (rama main)
  # ─────────────────────────────────────────────
  deploy-production:
    name: 🏆 Deploy Producción
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: 🏆 Deploy a Producción
        run: |
          echo "✅ Deploy a PRODUCCIÓN iniciado"
          echo "📦 Imagen: techcup-futbol:latest"
          # Reemplazar con comando real, por ejemplo:
          # ssh ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_HOST }} \
          #   "cd /app && docker compose pull && docker compose up -d"
          echo "✅ Deploy a Producción completado"
